name: Generate 3D Contribution Chart

on:
  schedule:
    # 每天凌晨 2:00 (UTC+8) 生成一次
    - cron: "0 18 * * *"
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate 3D Contrib
        uses: yoshi389111/github-profile-3d-contrib@latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}

      - name: Copy SVGs to dist
        run: |
          mkdir -p dist
          cp profile-3d-contrib/profile-night-view.svg dist/profile-3d-contrib-night.svg
          cp profile-3d-contrib/profile-green.svg dist/profile-3d-contrib-day.svg

      - name: Push to Output Branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output-3d
          build_dir: dist
          keep_history: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
